<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" image-rendering="pixelated">
  <defs>
    <style>
      .body { fill: #FF6B35; }
      .body-dark { fill: #CC4A1A; }
      .body-light { fill: #FF8C5A; }
      .accent { fill: #C0C0C0; }
      .accent-dark { fill: #808080; }
      .accent-light { fill: #E8E8E8; }
      .circuit { fill: #00FFFF; }
      .eye { fill: #2D3436; }
      .eye-shine { fill: #FFFFFF; }
      .claw { fill: #FF6B35; }
      .claw-dark { fill: #B34700; }
      .mouth { fill: #E17055; }
      .hair { fill: #4A3728; }
    </style>
  </defs>
  
  <!-- Row 0: IDLE (0,0 to 64,64) -->
  <g id="idle">
    <!-- Shadow -->
    <ellipse cx="32" cy="60" rx="12" ry="4" fill="#000000" opacity="0.2"/>
    
    <!-- Tail -->
    <path class="body-dark" d="M24 48 L28 52 L32 50 L36 52 L40 48 L38 44 L26 44 Z"/>
    <path class="body" d="M26 46 L28 50 L32 48 L36 50 L38 46 L36 44 L28 44 Z"/>
    
    <!-- Legs idle -->
    <rect x="20" y="50" width="3" height="8" class="body-dark" rx="1"/>
    <rect x="41" y="50" width="3" height="8" class="body-dark" rx="1"/>
    <rect x="24" y="52" width="2" height="6" class="body" rx="1"/>
    <rect x="38" y="52" width="2" height="6" class="body" rx="1"/>
    
    <!-- Body -->
    <rect x="20" y="28" width="24" height="20" class="body" rx="4"/>
    <rect x="22" y="30" width="20" height="16" class="body-light" rx="3"/>
    
    <!-- Robot chest -->
    <rect x="26" y="32" width="12" height="8" class="accent" rx="2"/>
    <rect x="28" y="33" width="8" height="2" class="accent-dark"/>
    <rect x="30" y="36" width="4" height="2" class="circuit"/>
    
    <!-- Circuits -->
    <rect x="22" y="35" width="3" height="1" class="circuit"/>
    <rect x="39" y="35" width="3" height="1" class="circuit"/>
    
    <!-- Arms idle -->
    <rect x="14" y="38" width="4" height="10" class="body" rx="2"/>
    <rect x="46" y="38" width="4" height="10" class="body" rx="2"/>
    
    <!-- Claws idle -->
    <ellipse cx="11" cy="48" rx="5" ry="4" class="claw"/>
    <ellipse cx="53" cy="48" rx="5" ry="4" class="claw"/>
    
    <!-- Neck -->
    <rect x="28" y="24" width="8" height="5" class="body"/>
    
    <!-- Head -->
    <rect x="20" y="10" width="24" height="18" class="body" rx="6"/>
    <rect x="22" y="12" width="20" height="14" class="body-light" rx="5"/>
    
    <!-- Hair -->
    <path class="hair" d="M22 12 L22 8 L26 6 L32 5 L38 6 L42 8 L42 12 L40 10 L38 11 L32 10 L26 11 L24 10 Z"/>
    
    <!-- Antenna -->
    <path stroke="#FF6B35" stroke-width="1" fill="none" d="M26 8 Q24 4 22 2"/>
    <path stroke="#FF6B35" stroke-width="1" fill="none" d="M38 8 Q40 4 42 2"/>
    <circle cx="22" cy="2" r="1" class="claw-dark"/>
    <circle cx="42" cy="2" r="1" class="claw-dark"/>
    
    <!-- Face -->
    <rect x="26" y="16" width="5" height="5" class="eye" rx="2"/>
    <rect x="33" y="16" width="5" height="5" class="eye" rx="2"/>
    <rect x="27" y="17" width="2" height="2" class="eye-shine"/>
    <rect x="34" y="17" width="2" height="2" class="eye-shine"/>
    
    <!-- Robot eye -->
    <rect x="27" y="22" width="4" height="2" class="accent"/>
    <rect x="28" y="22" width="2" height="2" class="circuit"/>
    
    <!-- Mouth -->
    <rect x="28" y="24" width="8" height="2" class="mouth" rx="1"/>
  
  
</g></svg>