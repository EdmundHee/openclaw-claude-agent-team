<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128" width="64" height="128" image-rendering="pixelated">
  <defs>
    <style>
      .skin { fill: #FFECCC; }
      .skin-dark { fill: #E6C99A; }
      .hair { fill: #8B4513; }
      .hair-dark { fill: #5D2E0C; }
      .hair-light { fill: #A0522D; }
      .shirt { fill: #27AE60; }
      .shirt-dark { fill: #1E8449; }
      .shirt-light { fill: #2ECC71; }
      .accent { fill: #F39C12; }
      .eye { fill: #2D3436; }
      .eye-shine { fill: #FFFFFF; }
      .mouth { fill: #E74C3C; }
    </style>
  </defs>
  
  <!-- IDLE -->
  <g id="idle">
    <ellipse cx="32" cy="60" rx="12" ry="4" fill="#000000" opacity="0.2"/>
    
    <!-- Legs -->
    <rect x="22" y="50" width="6" height="10" fill="#2C3E50" rx="2"/>
    <rect x="36" y="50" width="6" height="10" fill="#2C3E50" rx="2"/>
    <rect x="23" y="51" width="4" height="8" fill="#34495E" rx="1"/>
    <rect x="37" y="51" width="4" height="8" fill="#34495E" rx="1"/>
    
    <!-- Shoes -->
    <rect x="20" y="56" width="10" height="4" fill="#27AE60" rx="2"/>
    <rect x="34" y="56" width="10" height="4" fill="#27AE60" rx="2"/>
    
    <!-- Body -->
    <rect x="20" y="30" width="24" height="22" class="shirt" rx="4"/>
    <rect x="22" y="32" width="20" height="18" class="shirt-light" rx="3"/>
    
    <!-- QA/TEST text on shirt -->
    <rect x="26" y="36" width="12" height="4" fill="#FFFFFF" rx="1"/>
    <rect x="27" y="37" width="10" height="2" fill="#27AE60"/>
    
    <!-- Checkmark on shirt -->
    <path stroke="#FFFFFF" stroke-width="2" fill="none" d="M29 44 L32 47 L36 41"/>
    
    <!-- Neck -->
    <rect x="28" y="26" width="8" height="5" class="skin"/>
    
    <!-- Arms -->
    <rect x="12" y="32" width="6" height="16" class="shirt" rx="3"/>
    <rect x="46" y="32" width="6" height="16" class="shirt" rx="3"/>
    
    <!-- Hands -->
    <circle cx="15" cy="50" r="4" class="skin"/>
    <circle cx="49" cy="50" r="4" class="skin"/>
    
    <!-- Clipboard in hand -->
    <rect x="44" y="44" width="8" height="10" fill="#8B4513" rx="1"/>
    <rect x="46" y="46" width="4" height="6" fill="#FFFFFF" rx="1"/>
    
    <!-- Head -->
    <rect x="18" y="8" width="28" height="22" class="skin" rx="8"/>
    
    <!-- Hair (messy brown) -->
    <path class="hair" d="M18 14 L16 6 L22 2 L28 0 L34 2 L40 6 L48 10 L46 16 L44 8 L40 4 L32 2 L24 4 L20 8 Z"/>
    <path class="hair-dark" d="M20 12 L18 16 L22 14 Z"/>
    <path class="hair-dark" d="M44 12 L46 16 L42 14 Z"/>
    <path class="hair-light" d="M26 4 L28 2 L30 4"/>
    
    <!-- Ears -->
    <rect x="14" y="16" width="4" height="6" class="skin" rx="2"/>
    <rect x="46" y="16" width="4" height="6" class="skin" rx="2"/>
    
    <!-- Eyes (wide, enthusiastic) -->
    <rect x="23" y="15" width="7" height="7" class="eye" rx="3"/>
    <rect x="34" y="15" width="7" height="7" class="eye" rx="3"/>
    <rect x="25" y="17" width="3" height="3" class="eye-shine"/>
    <rect x="36" y="17" width="3" height="3" class="eye-shine"/>
    
    <!-- Eyebrows -->
    <rect x="22" y="11" width="8" height="2" class="hair-dark" rx="1"/>
    <rect x="34" y="11" width="8" height="2" class="hair-dark" rx="1"/>
    
    <!-- Excited smile -->
    <path stroke="#E74C3C" stroke-width="2" fill="none" d="M27 26 Q32 30 37 26"/>
    
    <!-- Blush -->
    <rect x="20" y="22" width="4" height="2" fill="#FFB6C1" opacity="0.5" rx="1"/>
    <rect x="40" y="22" width="4" height="2" fill="#FFB6C1" opacity="0.5" rx="1"/>
  
  
  <!-- WORKING -->
  
    <ellipse cx="32" cy="60" rx="12" ry="4" fill="#000000" opacity="0.2"/>
    
    <!-- Legs bouncing -->
    <rect x="22" y="49" width="6" height="10" fill="#2C3E50" rx="2"/>
    <rect x="36" y="49" width="6" height="10" fill="#2C3E50" rx="2"/>
    <rect x="23" y="50" width="4" height="8" fill="#34495E" rx="1"/>
    <rect x="37" y="50" width="4" height="8" fill="#34495E" rx="1"/>
    
    <rect x="20" y="55" width="10" height="4" fill="#27AE60" rx="2"/>
    <rect x="34" y="55" width="10" height="4" fill="#27AE60" rx="2"/>
    
    <!-- Body -->
    <rect x="20" y="29" width="24" height="22" class="shirt" rx="4"/>
    <rect x="22" y="31" width="20" height="18" class="shirt-light" rx="3"/>
    <rect x="26" y="35" width="12" height="4" fill="#FFFFFF" rx="1"/>
    <rect x="27" y="36" width="10" height="2" fill="#27AE60"/>
    <path stroke="#FFFFFF" stroke-width="2" fill="none" d="M29 43 L32 46 L36 40"/>
    
    <!-- Arms excited -->
    <rect x="10" y="28" width="6" height="18" class="shirt" rx="3"/>
    <rect x="48" y="28" width="6" height="18" class="shirt" rx="3"/>
    <rect x="8" y="44" width="6" height="6" class="skin" rx="2"/>
    <rect x="50" y="44" width="6" height="6" class="skin" rx="2"/>
    
    <!-- Magnifying glass raised -->
    <circle cx="10" cy="42" r="6" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2"/>
    <circle cx="10" cy="42" r="4" fill="#AED6F1" opacity="0.5"/>
    <rect x="14" y="46" width="3" height="8" fill="#5D2E0C" rx="1"/>
    <rect x="16" y="52" width="4" height="3" fill="#5D2E0C" rx="1"/>
    
    <!-- Neck -->
    <rect x="28" y="25" width="8" height="5" class="skin"/>
    
    <!-- Head -->
    <rect x="18" y="7" width="28" height="22" class="skin" rx="8"/>
    
    <!-- Hair bouncing -->
    <path class="hair" d="M18 13 L16 5 L22 1 L28 -1 L34 1 L40 5 L48 9 L46 15 L44 7 L40 3 L32 1 L24 3 L20 7 Z"/>
    <path class="hair-dark" d="M20 11 L18 15 L22 13 Z"/>
    <path class="hair-dark" d="M44 11 L46 15 L42 13 Z"/>
    <path class="hair-light" d="M26 3 L28 1 L30 3"/>
    
    <rect x="14" y="15" width="4" height="6" class="skin" rx="2"/>
    <rect x="46" y="15" width="4" height="6" class="skin" rx="2"/>
    
    <!-- Eyes excited -->
    <rect x="23" y="14" width="7" height="7" class="eye" rx="3"/>
    <rect x="34" y="14" width="7" height="7" class="eye" rx="3"/>
    <rect x="25" y="16" width="3" height="3" class="eye-shine"/>
    <rect x="36" y="16" width="3" height="3" class="eye-shine"/>
    
    <rect x="22" y="10" width="8" height="2" class="hair-dark" rx="1"/>
    <rect x="34" y="10" width="8" height="2" class="hair-dark" rx="1"/>
    
    <!-- Big excited smile -->
    <path stroke="#E74C3C" stroke-width="2" fill="none" d="M26 25 Q32 31 38 25"/>
    
    <!-- Blush -->
    <rect x="20" y="21" width="4" height="2" fill="#FFB6C1" opacity="0.5" rx="1"/>
    <rect x="40" y="21" width="4" height="2" fill="#FFB6C1" opacity="0.5" rx="1"/>
  
</g></svg>